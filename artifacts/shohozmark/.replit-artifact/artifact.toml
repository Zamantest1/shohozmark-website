kind = "web"
previewPath = "/"
title = "ShohozMark Website"
version = "1.0.0"
id = "artifacts/shohozmark"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18284

[services.development]
run = "pnpm --filter @workspace/shohozmark run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shohozmark", "run", "build" ]
publicDir = "artifacts/shohozmark/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18284"
BASE_PATH = "/"
